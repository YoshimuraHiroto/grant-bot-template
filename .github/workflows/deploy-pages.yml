name: Deploy to Pages
on:
  push:
    paths: ['docs/**']
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs to grant-pages
        run: |
          cd docs
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from grant-bot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/YoshimuraHiroto/grant-pages.git main
